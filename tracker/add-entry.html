<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Add Transaction - Shrish Admin</title>

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/images/favicon/favicon-96x96.png" />
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico" />
  <link rel="manifest" href="/assets/images/favicon/site.webmanifest" />
  <meta property="og:title" content="Shrish Admin - Add Transaction" />
  <meta property="og:type" content="website" />
  <meta property="og:description" content="Secure admin panel for managing Shrish Group finances." />
  <meta property="og:image" content="https://admin.shrishgroup.com/assets/images/logo.webp" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
  <link rel="stylesheet" href="add-entry.css" />
  <style>
    /* Mobile Responsiveness Overrides */
    @media (max-width: 768px) {
      .flow-buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .btn-flow {
        width: 100%;
        padding: 20px;
      }
      .form-grid {
        display: grid !important;
        grid-template-columns: 1fr !important;
        gap: 15px;
      }
      .form-actions {
        display: flex;
        flex-direction: column-reverse; /* Stacks primary action at the top */
        gap: 10px;
      }
      .form-actions button {
        width: 100%;
        margin: 0 !important;
      }
      .content-card {
        padding: 20px 15px;
      }
    }
  </style>
</head>

<body>
  <div id="admin-sidebar"></div>

  <div class="admin-main-content">
    <div id="admin-header"></div>

    <main class="admin-main">
      <div id="step-1" class="content-card flow-chooser">
        <h2>What kind of transaction is this?</h2>
        <div class="flow-buttons">
          <button type="button" class="btn-flow btn-debit" data-flow="Debit">
            <i class="fas fa-minus-circle"></i><br />Expense (Debit)
          </button>
          <button type="button" class="btn-flow btn-transfer" data-flow="Transfer">
            <i class="fas fa-exchange-alt"></i><br />Transfer
          </button>
          <button type="button" class="btn-flow btn-credit" data-flow="Credit">
            <i class="fas fa-plus-circle"></i><br />Income (Credit)
          </button>
        </div>
        <a href="index.html" class="back-link">&larr; Back to Dashboard</a>
      </div>

      <form id="entry-form" class="content-card" style="display: none;">
        <div class="form-grid">
          <div class="form-group">
            <label for="date">Transaction Date</label>
            <input type="date" id="date" required />
          </div>

          <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" step="0.01" placeholder="0.00" required />
          </div>

          <div class="form-group">
            <label for="account">From/To Account</label>
            <select id="account" required>
              <option value="">-- Select Account --</option>
              <option value="Travels">Travels</option>
              <option value="Company">Company</option>
              <option value="Associates">Associates</option>
              <option value="Marketing">Marketing</option>
            </select>
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="">-- Select Category --</option>
            </select>
          </div>

          <div class="form-group">
            <label for="sub-category">Sub-Category</label>
            <select id="sub-category" required>
              <option value="">-- Select Sub-Category --</option>
            </select>
          </div>

          <div class="form-group">
            <label for="payment-method">Payment Method</label>
            <select id="payment-method" required>
              <option value="">-- Select Method --</option>
              <option value="UPI">UPI</option>
              <option value="Cash">Cash</option>
              <option value="Bank Transfer">Bank Transfer</option>
              <option value="Credit Card">Credit Card</option>
              <option value="Fuel Card">Fuel Card</option>
            </select>
          </div>

          <div class="form-group">
            <label for="reference">Ref (Vehicle No / Card Name)</label>
            <input type="text" id="reference" placeholder="e.g. TN07-8292 or SBI Card">
          </div>

          <div class="form-group span-2">
            <label for="particulars">Particulars (Notes)</label>
            <textarea id="particulars" rows="3" placeholder="Enter details here..."></textarea>
          </div>
        </div>

        <input type="hidden" id="flow" />

        <div class="form-actions">
          <button type="button" id="btn-back-step" class="btn-secondary">
            &larr; Change Type
          </button>
          <button type="submit" id="btn-save-add" class="btn-secondary">Save & Add Another</button>
          <button type="submit" id="btn-save" class="btn-primary">Save Transaction</button>

        </div>
      </form>
    </main>

    <div id="admin-footer"></div>
  </div>

  <script src="/assets/js/common.js"></script>

  <script src="add-entry.js"></script>
</body>

</html>
